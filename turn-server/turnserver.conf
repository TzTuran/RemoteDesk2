# =============================================================================
# coturn TURN Server Configuration — Remote Desktop Solution
#
# Variable ${TURN_SECRET} is substituted by install scripts.
# Reference: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf
# =============================================================================

# =============================================================================
# --- Listening Ports ---
# =============================================================================

# Primary STUN/TURN port (UDP + TCP)
listening-port=3478

# TURNS — TURN over TLS (UDP + TCP).  Required for clients behind firewalls
# that block plaintext UDP.  Needs a valid TLS certificate (see [TLS] section).
tls-listening-port=5349

# =============================================================================
# --- Relay Port Range ---
# =============================================================================
# coturn allocates UDP relay ports from this range for each TURN allocation.
# Open 40000-40010/udp on the host firewall.
# For higher concurrency, widen this range (each session uses ~1 port pair).
min-port=40000
max-port=40010

# =============================================================================
# --- Authentication ---
# =============================================================================

# Use HMAC-SHA1 time-limited credentials (REST API / ephemeral credentials).
# Credentials are generated by Moonlight-Web server on demand using TURN_SECRET.
# Format: username = <timestamp>:<user_id>  password = HMAC-SHA1(secret, username)
use-auth-secret

# Shared secret — substituted by configure-turn.ps1 during installation.
# Keep this secret; rotate periodically.
static-auth-secret=${TURN_SECRET}

# Credential lifetime in seconds (3600 = 1 hour).
# Moonlight-Web generates short-lived credentials per session.
user-quota=0
total-quota=0
# max-bps=0   # Uncomment to throttle relay bandwidth per allocation

# =============================================================================
# --- Realm ---
# =============================================================================

# Realm is included in 401 Unauthorized challenges.
# Must match the realm expected by WebRTC clients.
realm=remote-desktop.local

# =============================================================================
# --- TLS Certificates ---
# =============================================================================

# PEM certificate chain (server cert + intermediates)
cert=/etc/coturn/certs/server.crt

# PEM private key
pkey=/etc/coturn/certs/server.key

# Minimum TLS version.  Disable TLS 1.0/1.1 for security.
# no-tlsv1
# no-tlsv1_1

# =============================================================================
# --- Logging ---
# =============================================================================

log-file=/var/log/coturn/turn.log

# verbose: log each allocation, permission, and channel bind.
# Comment out in production if log volume is too high; use 'Verbose' for debug.
verbose

# Uncomment for full packet traces during debugging:
# Verbose

# =============================================================================
# --- Security Hardening ---
# =============================================================================

# Disable plain TCP relay (WebRTC uses UDP; TCP relay only when UDP unavailable).
# no-tcp-relay is intentionally NOT set here — Moonlight-Web may need TCP relay
# for clients behind strict firewalls.  Enable if UDP-only is acceptable.
# no-tcp-relay

# Deny relay to RFC-1918 / loopback ranges to prevent SSRF / pivot attacks.
# Uncomment 'allowed-peer-ip' entries to re-permit specific internal ranges
# (e.g. if relay to Tailscale addresses is required).
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Re-allow the specific LAN subnet hosting the Sunshine server if LAN relay
# is needed (e.g. Sunshine on 192.168.1.10 must be reachable via TURN).
# Comment out / adjust to match your network.
allowed-peer-ip=192.168.0.0-192.168.255.255

# WebRTC DTLS fingerprint verification — required by all modern WebRTC stacks.
fingerprint

# Disable multicast relay — not used by WebRTC.
no-multicast-peers

# Stale nonce window (seconds).  Shorter window = more frequent re-auth.
stale-nonce=600

# =============================================================================
# --- Performance ---
# =============================================================================

# Worker threads (0 = auto-detect based on CPU cores).
# proc-user=coturn
# proc-group=coturn

# Max sessions (0 = unlimited)
# max-allocate-lifetime=3600
